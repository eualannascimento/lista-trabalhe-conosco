name: 'Expand large companies list'
run-name: 'Discover and add large Brazilian companies to list.csv (manual)'

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Parallel workers for URL discovery'
        required: false
        default: '20'

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Github Checkout
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run expansion script
        env:
          WORKERS: ${{ github.event.inputs.workers }}
        run: python scripts/expand_large_companies_br.py

      - name: Rebuild README
        run: python main.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'chore: expand large-company list via workflow_dispatch'
